name: Upcoming Comeback Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1,3,5"

permissions:
  contents: write

concurrency:
  group: upcoming-kpop-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Rebuild watchlist and scan future candidates
        run: |
          python build_tracking_watchlist.py
          python scan_upcoming_candidates.py
          python build_manual_review_queue.py
          cp tracking_watchlist.json web/src/data/watchlist.json
          cp upcoming_release_candidates.json web/src/data/upcomingCandidates.json
          python hydrate_release_windows.py
          python build_mv_manual_review_queue.py
          python build_release_change_log.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Commit refreshed data
        run: |
          if git diff --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracking_watchlist.json tracking_watchlist.csv upcoming_release_candidates.json upcoming_release_candidates.csv manual_review_queue.json manual_review_queue.csv mv_manual_review_queue.json mv_manual_review_queue.csv web/src/data/watchlist.json web/src/data/upcomingCandidates.json web/src/data/releases.json web/src/data/releaseArtwork.json web/src/data/releaseDetails.json web/src/data/releaseChangeLog.json
          git commit -m "chore: refresh upcoming scan data"
          git push
