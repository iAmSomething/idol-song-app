name: Daily Upcoming Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-upcoming-sync
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          if [ -n "${DATABASE_URL:-}" ]; then
            pip install -r backend/requirements-import.txt
          fi

      - name: Install backend dependencies
        if: ${{ env.DATABASE_URL != '' }}
        working-directory: backend
        run: npm ci

      - name: Rebuild watchlist and refresh upcoming signals
        env:
          BACKEND_PUBLIC_URL: ${{ vars.VITE_API_BASE_URL }}
          MOBILE_PUSH_DELIVERY_ENABLED: ${{ vars.MOBILE_PUSH_DELIVERY_ENABLED }}
        run: |
          python build_tracking_watchlist.py
          python scan_upcoming_candidates.py
          python build_manual_review_queue.py
          if [ -n "${DATABASE_URL:-}" ]; then
            python sync_upcoming_pipeline_to_neon.py --summary-path /tmp/upcoming-pipeline-db-sync-summary.json
            python sync_trusted_upcoming_notification_events.py --summary-path backend/reports/trusted_upcoming_notification_event_summary.json --markdown-path backend/reports/trusted_upcoming_operator_alert_report.md
            if [ "${MOBILE_PUSH_DELIVERY_ENABLED:-false}" = "true" ]; then
              python deliver_trusted_push_notifications.py --summary-path backend/reports/mobile_push_delivery_summary.json --markdown-path backend/reports/mobile_push_delivery_report.md
            else
              echo "MOBILE_PUSH_DELIVERY_ENABLED is not true; skipping trusted push fanout."
            fi
            (
              cd backend
              npm run projection:refresh
              npm run worker:cadence
              npm run null:coverage
              npm run null:recheck
              npm run null:trend
              npm run gap:workbenches
              npm run report:bundle -- --bundle-kind post-sync-verification --cadence-profile daily-upcoming
            )
            python build_backend_json_parity_report.py --bundle-path backend/reports/report_bundle_metadata.json
            (
              cd backend
              npm run shadow:verify -- --bundle-path ./reports/report_bundle_metadata.json
              npm run runtime:gate -- --bundle-path ./reports/report_bundle_metadata.json
              npm run migration:scorecard -- --bundle-path ./reports/report_bundle_metadata.json
              npm run freshness:handoff -- --target production --backend-public-url "$BACKEND_PUBLIC_URL" --bundle-path ./reports/report_bundle_metadata.json
            )
          else
            echo "DATABASE_URL not configured; skipping DB sync and backend verification chain."
          fi
          python build_release_change_log.py --upcoming-path upcoming_release_candidates.json --releases-path group_latest_release_since_2025-06-01_mb.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Export non-runtime web snapshots
        working-directory: backend
        run: npm run export:web-snapshots -- --source-workflow weekly-kpop-scan.yml --cadence-profile daily-upcoming

      - name: Restore runtime web snapshots before commit
        run: |
          git restore web/src/data/watchlist.json web/src/data/upcomingCandidates.json web/src/data/releases.json web/src/data/releaseArtwork.json web/src/data/releaseDetails.json web/src/data/releaseHistory.json web/src/data/releaseChangeLog.json web/src/data/artistProfiles.json web/src/data/youtubeChannelAllowlists.json

      - name: Upload backend freshness handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-freshness-handoff-production
          path: backend/reports/backend_freshness_handoff.json
          if-no-files-found: warn

      - name: Commit refreshed data
        run: |
          if git diff --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracking_watchlist.json tracking_watchlist.csv upcoming_release_candidates.json upcoming_release_candidates.csv manual_review_queue.json manual_review_queue.csv mv_manual_review_queue.json mv_manual_review_queue.csv backend/exports/non_runtime_web_snapshots backend/reports/projection_refresh_summary.json backend/reports/worker_cadence_report.json backend/reports/canonical_null_coverage_report.json backend/reports/canonical_null_recheck_queue.json backend/reports/canonical_null_coverage_history.json backend/reports/null_coverage_trend_report.json backend/reports/service_link_gap_queues.json backend/reports/service_link_gap_queue_spotify.csv backend/reports/service_link_gap_queue_youtube_music.csv backend/reports/service_link_gap_queue_youtube_mv.csv backend/reports/title_track_gap_queue.json backend/reports/title_track_gap_queue.csv backend/reports/entity_identity_workbench.json backend/reports/entity_identity_workbench_entities.csv backend/reports/entity_identity_field_queue.csv backend/reports/report_bundle_metadata.json backend/reports/backend_json_parity_report.json backend/reports/backend_shadow_read_report.json backend/reports/runtime_gate_report.json backend/reports/migration_readiness_scorecard.json backend/reports/migration_readiness_scorecard.md backend/reports/backend_freshness_handoff.json backend/reports/trusted_upcoming_notification_event_summary.json backend/reports/trusted_upcoming_operator_alert_report.md backend/reports/mobile_push_delivery_summary.json backend/reports/mobile_push_delivery_report.md
          git commit -m "chore: refresh daily upcoming sync data"
          git push
