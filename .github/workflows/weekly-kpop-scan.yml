name: Weekly K-pop Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

permissions:
  contents: write

concurrency:
  group: weekly-kpop-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Rebuild watchlist and scan future candidates
        run: |
          python build_tracking_watchlist.py
          python scan_upcoming_candidates.py
          cp tracking_watchlist.json web/src/data/watchlist.json
          cp upcoming_release_candidates.json web/src/data/upcomingCandidates.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Commit refreshed data
        run: |
          if git diff --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tracking_watchlist.json tracking_watchlist.csv upcoming_release_candidates.json upcoming_release_candidates.csv web/src/data/watchlist.json web/src/data/upcomingCandidates.json
          git commit -m "chore: refresh weekly kpop scan data"
          git push
