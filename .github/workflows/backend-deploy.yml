name: Backend Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"

permissions:
  contents: read

jobs:
  deploy-preview:
    if: github.event_name == 'push' || github.event.inputs.target == 'preview'
    runs-on: ubuntu-latest
    environment:
      name: preview
      url: ${{ vars.BACKEND_PUBLIC_URL }}
    concurrency:
      group: backend-deploy-preview
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify preview deploy environment contract
        working-directory: backend
        env:
          BACKEND_DEPLOY_TARGET: preview
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: npm run deploy:env:verify -- --target preview --report-path ./reports/deploy_env_contract_preview.json

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend tests
        working-directory: backend
        run: npm run test

      - name: Run preview query-plan regression check
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run plan:verify

      - name: Upload preview query-plan regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-query-plan-preview
          path: backend/reports/query_plan_regression_report.json
          if-no-files-found: warn

      - name: Upload preview deploy environment contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy-env-preview
          path: backend/reports/deploy_env_contract_preview.json
          if-no-files-found: warn

      - name: Deploy preview backend
        env:
          BACKEND_DEPLOY_TARGET: preview
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: node ./backend/scripts/deploy-backend.mjs

      - name: Run preview canonical fixture smoke checks
        working-directory: backend
        env:
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
        run: npm run smoke:live -- --target preview --base-url "$BACKEND_PUBLIC_URL" --report-path ./reports/live_backend_smoke_preview.json

      - name: Build preview backend freshness handoff artifact
        working-directory: backend
        env:
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
        run: npm run freshness:handoff -- --target preview --backend-public-url "$BACKEND_PUBLIC_URL" --report-path ./reports/backend_freshness_handoff_preview.json

      - name: Upload preview live smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-live-smoke-preview
          path: backend/reports/live_backend_smoke_preview.json
          if-no-files-found: warn

      - name: Upload preview backend freshness handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-freshness-handoff-preview
          path: backend/reports/backend_freshness_handoff_preview.json
          if-no-files-found: warn

  deploy-production:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.BACKEND_PUBLIC_URL }}
    concurrency:
      group: backend-deploy-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify production deploy environment contract
        working-directory: backend
        env:
          BACKEND_DEPLOY_TARGET: production
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: npm run deploy:env:verify -- --target production --report-path ./reports/deploy_env_contract_production.json

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend tests
        working-directory: backend
        run: npm run test

      - name: Run production query-plan regression check
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run plan:verify

      - name: Upload production query-plan regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-query-plan-production
          path: backend/reports/query_plan_regression_report.json
          if-no-files-found: warn

      - name: Upload production deploy environment contract report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-deploy-env-production
          path: backend/reports/deploy_env_contract_production.json
          if-no-files-found: warn

      - name: Deploy production backend
        env:
          BACKEND_DEPLOY_TARGET: production
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
        run: node ./backend/scripts/deploy-backend.mjs

      - name: Run production canonical fixture smoke checks
        working-directory: backend
        env:
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
        run: npm run smoke:live -- --target production --base-url "$BACKEND_PUBLIC_URL" --report-path ./reports/live_backend_smoke_production.json

      - name: Build production backend freshness handoff artifact
        working-directory: backend
        env:
          BACKEND_PUBLIC_URL: ${{ vars.BACKEND_PUBLIC_URL }}
        run: npm run freshness:handoff -- --target production --backend-public-url "$BACKEND_PUBLIC_URL" --report-path ./reports/backend_freshness_handoff_production.json

      - name: Upload production live smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-live-smoke-production
          path: backend/reports/live_backend_smoke_production.json
          if-no-files-found: warn

      - name: Upload production backend freshness handoff artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-freshness-handoff-production
          path: backend/reports/backend_freshness_handoff_production.json
          if-no-files-found: warn
