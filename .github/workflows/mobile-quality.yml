name: Mobile Quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-quality.yml"
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-quality.yml"

permissions:
  contents: read

concurrency:
  group: mobile-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Verify mobile runtime policy
        run: npm run verify:runtime-policy

      - name: Run mobile UI test suite
        run: npm run test:qa:ui

      - name: Run mobile functional test suite
        run: npm run test:qa:functional

      - name: Run mobile server communication test suite
        run: npm run test:qa:server

      - name: Run mobile typecheck
        run: npm run typecheck

      - name: Run mobile lint
        run: npm run lint

      - name: Verify mobile platform sanity
        run: npm run verify:qa:platforms
