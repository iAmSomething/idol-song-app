name: Web Quality

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-quality.yml"
  push:
    branches:
      - main
    paths:
      - "web/**"
      - ".github/workflows/web-quality.yml"

permissions:
  contents: read

concurrency:
  group: web-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Run web runtime policy tests
        run: npm run test:runtime-policy

      - name: Run web search runtime tests
        run: npm run test:search-runtime

      - name: Run Pages read bridge tests
        run: npm run test:pages-read-bridge

      - name: Verify web runtime policy
        run: npm run verify:runtime-policy

      - name: Run web lint
        run: npm run lint

      - name: Run web build
        run: npm run build

      - name: Verify Pages read bridge
        run: npm run verify:pages-read-bridge
