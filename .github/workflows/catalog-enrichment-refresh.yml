name: Catalog Enrichment Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * 0"

permissions:
  contents: write

concurrency:
  group: catalog-enrichment-refresh
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            web/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          if [ -n "${DATABASE_URL:-}" ]; then
            pip install -r backend/requirements-import.txt
          fi

      - name: Install backend dependencies
        if: ${{ env.DATABASE_URL != '' }}
        working-directory: backend
        run: npm ci

      - name: Run slower catalog enrichment path
        env:
          BACKEND_PUBLIC_URL: ${{ vars.VITE_API_BASE_URL }}
        run: |
          python youtube_channel_allowlists.py
          python build_entity_metadata_acquisition.py
          python build_canonical_entity_metadata.py
          python build_release_history_musicbrainz.py
          python build_release_rollup_from_history.py
          python build_release_details_musicbrainz.py
          python build_release_artwork_catalog.py
          python build_entity_asset_coverage_report.py
          python backfill_release_detail_mvs.py
          python build_mv_manual_review_queue.py
          if [ -n "${DATABASE_URL:-}" ]; then
            python sync_release_pipeline_to_neon.py --summary-path /tmp/release-pipeline-db-sync-summary.json
            python sync_upcoming_pipeline_to_neon.py --summary-path /tmp/upcoming-pipeline-db-sync-summary.json
            (
              cd backend
              npm run projection:refresh
              npm run worker:cadence
              npm run null:coverage
              npm run null:recheck
              npm run null:trend
              npm run gap:workbenches
              npm run same-day:acceptance
              npm run report:bundle -- --bundle-kind catalog-enrichment --cadence-profile weekly-enrichment
            )
            python build_backend_json_parity_report.py --bundle-path backend/reports/report_bundle_metadata.json
            (
              cd backend
              npm run shadow:verify -- --bundle-path ./reports/report_bundle_metadata.json
              npm run runtime:gate -- --bundle-path ./reports/report_bundle_metadata.json
              npm run migration:scorecard -- --bundle-path ./reports/report_bundle_metadata.json
              npm run freshness:handoff -- --target production --backend-public-url "$BACKEND_PUBLIC_URL" --bundle-path ./reports/report_bundle_metadata.json
            )
          else
            echo "DATABASE_URL not configured; skipping DB sync and backend verification chain."
          fi
          python build_release_change_log.py

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend
        working-directory: web
        run: npm run build

      - name: Export non-runtime web snapshots
        working-directory: backend
        run: npm run export:web-snapshots -- --source-workflow catalog-enrichment-refresh.yml --cadence-profile weekly-enrichment

      - name: Restore runtime web snapshots before commit
        run: |
          git restore web/src/data/watchlist.json web/src/data/upcomingCandidates.json web/src/data/releases.json web/src/data/releaseArtwork.json web/src/data/releaseDetails.json web/src/data/releaseHistory.json web/src/data/releaseChangeLog.json web/src/data/artistProfiles.json web/src/data/youtubeChannelAllowlists.json

      - name: Upload migration readiness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-readiness-scorecard
          path: |
            backend/reports/migration_readiness_scorecard.json
            backend/reports/migration_readiness_scorecard.md
          if-no-files-found: warn

      - name: Commit refreshed enrichment data
        run: |
          if git diff --quiet; then
            echo "No enrichment changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artist_profiles_seed.json team_badge_assets.json youtube_channel_allowlists.json release_detail_catalog.json release_artwork_catalog.json entity_metadata_acquisition.json canonical_entity_metadata.json verified_release_history_mb.json verified_release_history_mb.csv verified_release_history_mb_unresolved.json group_latest_release_since_2025-06-01_mb.json group_latest_release_since_2025-06-01_mb.csv title_track_manual_review_queue.json title_track_manual_review_queue.csv release_detail_manual_review_queue.json release_detail_manual_review_queue.csv mv_manual_review_queue.json mv_manual_review_queue.csv backend/exports/non_runtime_web_snapshots backend/reports/entity_asset_coverage_report.json backend/reports/entity_asset_coverage_report.md backend/reports/historical_release_detail_coverage_report.json backend/reports/historical_release_detail_coverage_summary.md backend/reports/projection_refresh_summary.json backend/reports/worker_cadence_report.json backend/reports/canonical_null_coverage_report.json backend/reports/canonical_null_recheck_queue.json backend/reports/canonical_null_coverage_history.json backend/reports/null_coverage_trend_report.json backend/reports/service_link_gap_queues.json backend/reports/service_link_gap_queue_spotify.csv backend/reports/service_link_gap_queue_youtube_music.csv backend/reports/service_link_gap_queue_youtube_mv.csv backend/reports/title_track_gap_queue.json backend/reports/title_track_gap_queue.csv backend/reports/entity_identity_workbench.json backend/reports/entity_identity_workbench_entities.csv backend/reports/entity_identity_field_queue.csv backend/reports/report_bundle_metadata.json backend/reports/backend_json_parity_report.json backend/reports/backend_shadow_read_report.json backend/reports/runtime_gate_report.json backend/reports/migration_readiness_scorecard.json backend/reports/migration_readiness_scorecard.md backend/reports/backend_freshness_handoff.json
          git commit -m "chore: refresh catalog enrichment data"
          git push
